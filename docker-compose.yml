services:
  postgres:
    image: postgres:16-alpine
    container_name: signalforge-postgres
    environment:
      POSTGRES_DB: signalforge
      POSTGRES_USER: signalforge
      POSTGRES_PASSWORD: signalforge
    ports:
      - "5432:5432"
    volumes:
      - signalforge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalforge -d signalforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: signalforge-redis
    ports:
      - "6379:6379"
    volumes:
      - signalforge_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  signalforge_postgres:
  signalforge_redis:
